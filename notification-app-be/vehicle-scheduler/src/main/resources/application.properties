spring.application.name=vehicle-scheduler
server.port=8080
spring.jackson.serialization.write-dates-as-timestamps=false

# Affordmed API configuration
affordmed.api.base-url=${AFFORDMED_API_BASE_URL:}
affordmed.api.bearer-token=${AFFORDMED_API_BEARER_TOKEN:}
affordmed.api.connect-timeout-millis=5000
affordmed.api.read-timeout-millis=10000

# Evaluation API endpoints supplied in the assignment
affordmed.api.evaluation.depots-path=/evaluation-service/depots
affordmed.api.evaluation.vehicles-path=/evaluation-service/vehicles

# Set this to the Affordmed logging middleware endpoint.
# The code supports either a full URL or a path relative to affordmed.api.base-url.
affordmed.api.logging.endpoint=${AFFORDMED_LOGGING_ENDPOINT:}

# Optional overrides for the vehicle payload field names when the full API contract is known.
affordmed.api.vehicle-field-mapping.depot-id=${AFFORDMED_VEHICLE_DEPOT_FIELD:}
affordmed.api.vehicle-field-mapping.mechanic-hours=${AFFORDMED_VEHICLE_MECHANIC_HOURS_FIELD:}
affordmed.api.vehicle-field-mapping.operational-impact-score=${AFFORDMED_VEHICLE_IMPACT_SCORE_FIELD:}
